name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push container image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Resolve version
        id: version
        run: |
          ref="${GITHUB_REF_NAME}"
          version="${ref#v}"
          date="$(date -u +%Y%m%d)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "version_date=${version}-${date}" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/build-push-image
        with:
          maxmind_license_key: ${{ secrets.MAXMIND_LICENSE_KEY }}
          registry: ${{ env.REGISTRY }}
          image_name: ${{ env.IMAGE_NAME }}
          registry_user: ${{ github.actor }}
          registry_password: ${{ secrets.GITHUB_TOKEN }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.version_date }}
          labels: |
            org.opencontainers.image.title=cptv
            org.opencontainers.image.description=CaPTiVe — self-hosted network diagnostics.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT
