name: geolite2-refresh

on:
  schedule:
    - cron: "23 5 * * 1"
  workflow_dispatch:
  workflow_call:

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  refresh:
    name: Refresh GeoLite2 and rebuild latest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Compute tags
        id: tags
        run: |
          date="$(date -u +%Y%m%d)"
          echo "date=${date}" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/build-push-image
        with:
          maxmind_license_key: ${{ secrets.MAXMIND_LICENSE_KEY }}
          registry: ${{ env.REGISTRY }}
          image_name: ${{ env.IMAGE_NAME }}
          registry_user: ${{ github.actor }}
          registry_password: ${{ secrets.GITHUB_TOKEN }}
          tags: |
            type=raw,value=latest
            type=raw,value=geolite2-${{ steps.tags.outputs.date }}
          labels: |
            org.opencontainers.image.title=cptv
            org.opencontainers.image.description=CaPTiVe — self-hosted network diagnostics.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
